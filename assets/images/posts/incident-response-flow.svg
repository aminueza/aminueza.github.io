<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <rect width="860" height="400" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Incident Response: The Eight Steps</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">Detect &#8594; Classify &#8594; Assign roles &#8594; Notify &#8594; Fix &#8594; Communicate &#8594; Resolve &#8594; Post-mortem</text>

  <!-- Step 1: Detect -->
  <g filter="url(#shadow)">
    <rect x="30" y="68" width="90" height="56" rx="8" fill="#c62828"/>
    <text x="75" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">1. Detect</text>
    <text x="75" y="108" text-anchor="middle" fill="#ffcdd2" font-size="8">Alert / report</text>
  </g>
  <line x1="124" y1="96" x2="144" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Incident? -->
  <g filter="url(#shadow)">
    <rect x="148" y="68" width="90" height="56" rx="8" fill="#e65100"/>
    <text x="193" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">2. Triage</text>
    <text x="193" y="108" text-anchor="middle" fill="#ffe0b2" font-size="8">Incident? Y/N</text>
  </g>
  <line x1="242" y1="96" x2="262" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Classify -->
  <g filter="url(#shadow)">
    <rect x="266" y="68" width="90" height="56" rx="8" fill="#e65100"/>
    <text x="311" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">3. Classify</text>
    <text x="311" y="108" text-anchor="middle" fill="#ffe0b2" font-size="8">P0/P1/P2/P3</text>
  </g>
  <line x1="360" y1="96" x2="380" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Assign + Notify -->
  <g filter="url(#shadow)">
    <rect x="384" y="68" width="106" height="56" rx="8" fill="#0078d4"/>
    <text x="437" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">4. Mobilize</text>
    <text x="437" y="108" text-anchor="middle" fill="#c8e1f5" font-size="8">Roles + channel</text>
  </g>
  <line x1="494" y1="96" x2="514" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Investigate -->
  <g filter="url(#shadow)">
    <rect x="518" y="68" width="90" height="56" rx="8" fill="#0078d4"/>
    <text x="563" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">5. Fix</text>
    <text x="563" y="108" text-anchor="middle" fill="#c8e1f5" font-size="8">RCA + deploy</text>
  </g>
  <line x1="612" y1="96" x2="632" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Comms -->
  <g filter="url(#shadow)">
    <rect x="636" y="68" width="90" height="56" rx="8" fill="#7b1fa2"/>
    <text x="681" y="92" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">6. Comms</text>
    <text x="681" y="108" text-anchor="middle" fill="#e1bee7" font-size="8">Teams + users</text>
  </g>
  <line x1="730" y1="96" x2="750" y2="96" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 7-8: Resolve + PIR -->
  <g filter="url(#shadow)">
    <rect x="754" y="68" width="80" height="56" rx="8" fill="#2e7d32"/>
    <text x="794" y="88" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">7. Resolve</text>
    <text x="794" y="104" text-anchor="middle" fill="#c8e6c9" font-size="8">8. Post-</text>
    <text x="794" y="116" text-anchor="middle" fill="#c8e6c9" font-size="8">mortem</text>
  </g>

  <!-- Three roles -->
  <rect x="30" y="148" width="804" height="68" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="168" text-anchor="middle" fill="#333" font-size="12" font-weight="700">Three Roles Assigned Immediately</text>

  <rect x="50" y="178" width="230" height="28" rx="6" fill="#fef0f0" stroke="#c62828" stroke-width="1"/>
  <text x="165" y="196" text-anchor="middle" fill="#c62828" font-size="10" font-weight="600">Incident Coordinator (EM)</text>

  <rect x="300" y="178" width="230" height="28" rx="6" fill="#e8f4fd" stroke="#0078d4" stroke-width="1"/>
  <text x="415" y="196" text-anchor="middle" fill="#0078d4" font-size="10" font-weight="600">Technical Lead (Senior Dev)</text>

  <rect x="550" y="178" width="260" height="28" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="680" y="196" text-anchor="middle" fill="#7b1fa2" font-size="10" font-weight="600">Communications Lead (PM)</text>

  <!-- Severity table -->
  <rect x="30" y="236" width="804" height="146" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="256" text-anchor="middle" fill="#333" font-size="12" font-weight="700">Severity Levels</text>

  <!-- P0 -->
  <rect x="50" y="268" width="180" height="48" rx="6" fill="#fef0f0" stroke="#c62828" stroke-width="1.5"/>
  <text x="140" y="286" text-anchor="middle" fill="#c62828" font-size="11" font-weight="700">P0 Critical</text>
  <text x="140" y="302" text-anchor="middle" fill="#555" font-size="9">>20% users | 15 min response</text>
  <text x="140" y="312" text-anchor="middle" fill="#888" font-size="8">All-hands. Updates every 30 min.</text>

  <!-- P1 -->
  <rect x="245" y="268" width="180" height="48" rx="6" fill="#fff8e8" stroke="#e65100" stroke-width="1.5"/>
  <text x="335" y="286" text-anchor="middle" fill="#e65100" font-size="11" font-weight="700">P1 High</text>
  <text x="335" y="302" text-anchor="middle" fill="#555" font-size="9">10-20% users | 30 min response</text>
  <text x="335" y="312" text-anchor="middle" fill="#888" font-size="8">Same-day. Updates every 2 hours.</text>

  <!-- P2 -->
  <rect x="440" y="268" width="180" height="48" rx="6" fill="#e8f4fd" stroke="#0078d4" stroke-width="1.5"/>
  <text x="530" y="286" text-anchor="middle" fill="#0078d4" font-size="11" font-weight="700">P2 Medium</text>
  <text x="530" y="302" text-anchor="middle" fill="#555" font-size="9">5-10% users | 2h response</text>
  <text x="530" y="312" text-anchor="middle" fill="#888" font-size="8">Next business day. Daily updates.</text>

  <!-- P3 -->
  <rect x="635" y="268" width="180" height="48" rx="6" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
  <text x="725" y="286" text-anchor="middle" fill="#555" font-size="11" font-weight="700">P3 Low</text>
  <text x="725" y="302" text-anchor="middle" fill="#555" font-size="9">&lt;5% users | 8h response</text>
  <text x="725" y="312" text-anchor="middle" fill="#888" font-size="8">Next sprint. Updates as needed.</text>

  <!-- Financial trigger -->
  <rect x="50" y="330" width="765" height="36" rx="6" fill="#fff8e8" stroke="#e65100" stroke-width="1"/>
  <text x="432" y="352" text-anchor="middle" fill="#e65100" font-size="10" font-weight="600">Financial trigger: unexpected cloud cost spike >50% = P1 minimum regardless of user impact</text>

  <!-- Bottom -->
  <text x="430" y="392" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Post-mortem is mandatory for P0 and P1. Blameless. Timeline + root cause + action items with owners.</text>
</svg>
