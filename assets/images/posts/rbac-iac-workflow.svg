<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <rect width="860" height="340" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">RBAC as Code: Provisioning Workflow</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">Request &#8594; PR &#8594; Plan &#8594; Approve &#8594; Apply &#8594; Audit. No portal clicks.</text>

  <!-- Step 1: Request -->
  <g filter="url(#shadow)">
    <rect x="30" y="75" width="120" height="70" rx="8" fill="#fff" stroke="#5c5c5c" stroke-width="1.5"/>
    <rect x="30" y="75" width="120" height="24" rx="8" fill="#5c5c5c"/>
    <rect x="30" y="88" width="120" height="11" fill="#5c5c5c"/>
    <text x="90" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1. Request</text>
  </g>
  <text x="90" y="116" text-anchor="middle" fill="#333" font-size="9">User or manager</text>
  <text x="90" y="130" text-anchor="middle" fill="#888" font-size="8">submits access need</text>

  <line x1="154" y1="110" x2="180" y2="110" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: PR -->
  <g filter="url(#shadow)">
    <rect x="185" y="75" width="120" height="70" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <rect x="185" y="75" width="120" height="24" rx="8" fill="#333"/>
    <rect x="185" y="88" width="120" height="11" fill="#333"/>
    <text x="245" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2. PR</text>
  </g>
  <text x="245" y="116" text-anchor="middle" fill="#333" font-size="9">Edit tfvars</text>
  <text x="245" y="130" text-anchor="middle" fill="#888" font-size="8">add role assignment</text>

  <line x1="309" y1="110" x2="335" y2="110" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Plan -->
  <g filter="url(#shadow)">
    <rect x="340" y="75" width="120" height="70" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="340" y="75" width="120" height="24" rx="8" fill="#e65100"/>
    <rect x="340" y="88" width="120" height="11" fill="#e65100"/>
    <text x="400" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3. Plan</text>
  </g>
  <text x="400" y="116" text-anchor="middle" fill="#333" font-size="9">CI runs terraform plan</text>
  <text x="400" y="130" text-anchor="middle" fill="#888" font-size="8">validates changes</text>

  <line x1="464" y1="110" x2="490" y2="110" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Approve -->
  <g filter="url(#shadow)">
    <rect x="495" y="75" width="120" height="70" rx="8" fill="#fff" stroke="#0078d4" stroke-width="1.5"/>
    <rect x="495" y="75" width="120" height="24" rx="8" fill="#0078d4"/>
    <rect x="495" y="88" width="120" height="11" fill="#0078d4"/>
    <text x="555" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4. Review</text>
  </g>
  <text x="555" y="116" text-anchor="middle" fill="#333" font-size="9">Security reviews PR</text>
  <text x="555" y="130" text-anchor="middle" fill="#888" font-size="8">approves or requests changes</text>

  <line x1="619" y1="110" x2="645" y2="110" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- Step 5: Apply -->
  <g filter="url(#shadow)">
    <rect x="650" y="75" width="120" height="70" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="650" y="75" width="120" height="24" rx="8" fill="#2e7d32"/>
    <rect x="650" y="88" width="120" height="11" fill="#2e7d32"/>
    <text x="710" y="90" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">5. Apply</text>
  </g>
  <text x="710" y="116" text-anchor="middle" fill="#333" font-size="9">Merge &#8594; terraform apply</text>
  <text x="710" y="130" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="600">access granted</text>

  <!-- Deprovisioning flow -->
  <rect x="30" y="175" width="800" height="68" rx="10" fill="#fef0f0" stroke="#c62828" stroke-width="1"/>
  <text x="430" y="196" text-anchor="middle" fill="#c62828" font-size="12" font-weight="700">Deprovisioning (same flow, reversed)</text>
  <text x="430" y="214" text-anchor="middle" fill="#555" font-size="10">User departs or changes role &#8594; PR removes assignment &#8594; plan &#8594; review &#8594; apply &#8594; access revoked</text>
  <text x="430" y="232" text-anchor="middle" fill="#888" font-size="9">Under 4 hours. PIM eligibility removed. All steps logged for audit.</text>

  <!-- Bottom: What lives where -->
  <rect x="30" y="260" width="250" height="62" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="155" y="280" text-anchor="middle" fill="#333" font-size="10" font-weight="700">Role Definitions</text>
  <text x="155" y="296" text-anchor="middle" fill="#888" font-size="9">modules/roles/custom-roles/</text>
  <text x="155" y="310" text-anchor="middle" fill="#888" font-size="8">Change rarely. Reviewed by security.</text>

  <rect x="300" y="260" width="250" height="62" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="425" y="280" text-anchor="middle" fill="#333" font-size="10" font-weight="700">PIM Policies</text>
  <text x="425" y="296" text-anchor="middle" fill="#888" font-size="9">modules/roles/pim-policies/</text>
  <text x="425" y="310" text-anchor="middle" fill="#888" font-size="8">Per-role activation rules. Set once.</text>

  <rect x="570" y="260" width="260" height="62" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="700" y="280" text-anchor="middle" fill="#333" font-size="10" font-weight="700">Role Assignments</text>
  <text x="700" y="296" text-anchor="middle" fill="#888" font-size="9">environments/*/rbac.tfvars</text>
  <text x="700" y="310" text-anchor="middle" fill="#888" font-size="8">Change often. User &#8594; role mappings.</text>
</svg>
