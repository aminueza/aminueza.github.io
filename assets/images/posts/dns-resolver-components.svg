<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd" />
      <stop offset="100%" style="stop-color:#d0e8f9" />
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <marker id="arrowGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c5c5c"/>
    </marker>
  </defs>

  <rect width="860" height="420" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">DNS Private Resolver: Inside the Hub</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">One resolver per hub. Inbound receives, outbound forwards. No VMs needed.</text>

  <!-- Hub VNet background -->
  <rect x="200" y="62" width="450" height="290" rx="12" fill="url(#hubGrad)" stroke="#0078d4" stroke-width="1.5"/>
  <text x="425" y="82" text-anchor="middle" fill="#0078d4" font-size="13" font-weight="700">Hub VNet</text>

  <!-- Inbound Endpoint -->
  <g filter="url(#shadow)">
    <rect x="225" y="96" width="180" height="70" rx="8" fill="#fff" stroke="#0078d4" stroke-width="1.5"/>
    <rect x="225" y="96" width="180" height="28" rx="8" fill="#0078d4"/>
    <rect x="225" y="112" width="180" height="12" fill="#0078d4"/>
    <text x="315" y="114" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Inbound Endpoint</text>
  </g>
  <text x="315" y="142" text-anchor="middle" fill="#333" font-size="10">Receives DNS queries</text>
  <text x="315" y="158" text-anchor="middle" fill="#0078d4" font-size="10" font-weight="600">10.x.x.4 (dedicated /28)</text>

  <!-- Outbound Endpoint -->
  <g filter="url(#shadow)">
    <rect x="445" y="96" width="180" height="70" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="445" y="96" width="180" height="28" rx="8" fill="#e65100"/>
    <rect x="445" y="112" width="180" height="12" fill="#e65100"/>
    <text x="535" y="114" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Outbound Endpoint</text>
  </g>
  <text x="535" y="142" text-anchor="middle" fill="#333" font-size="10">Forwards to rulesets</text>
  <text x="535" y="158" text-anchor="middle" fill="#e65100" font-size="10" font-weight="600">Dedicated /28 subnet</text>

  <!-- Private DNS Zones -->
  <g filter="url(#shadow)">
    <rect x="225" y="190" width="180" height="80" rx="8" fill="#fff" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="225" y="190" width="180" height="28" rx="8" fill="#2e7d32"/>
    <rect x="225" y="206" width="180" height="12" fill="#2e7d32"/>
    <text x="315" y="208" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Private DNS Zones</text>
  </g>
  <text x="315" y="238" text-anchor="middle" fill="#333" font-size="9">privatelink.postgres...</text>
  <text x="315" y="252" text-anchor="middle" fill="#333" font-size="9">privatelink.blob...</text>
  <text x="315" y="266" text-anchor="middle" fill="#888" font-size="9">25 zones linked to hub</text>

  <!-- Forwarding Ruleset -->
  <g filter="url(#shadow)">
    <rect x="445" y="190" width="180" height="80" rx="8" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="445" y="190" width="180" height="28" rx="8" fill="#e65100"/>
    <rect x="445" y="206" width="180" height="12" fill="#e65100"/>
    <text x="535" y="208" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Forwarding Ruleset</text>
  </g>
  <text x="535" y="238" text-anchor="middle" fill="#333" font-size="9">privatelink.* &#8594; inbound IP</text>
  <text x="535" y="252" text-anchor="middle" fill="#333" font-size="9">internal.net &#8594; inbound IP</text>
  <text x="535" y="266" text-anchor="middle" fill="#333" font-size="9">azure-api.net &#8594; public DNS</text>

  <!-- Connection: inbound to zones -->
  <line x1="315" y1="170" x2="315" y2="186" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <text x="340" y="182" fill="#2e7d32" font-size="8">resolves</text>

  <!-- Connection: outbound to ruleset -->
  <line x1="535" y1="170" x2="535" y2="186" stroke="#e65100" stroke-width="1.5" marker-end="url(#arrowO)"/>
  <text x="560" y="182" fill="#e65100" font-size="8">uses</text>

  <!-- Left: Sources of DNS queries -->
  <!-- Spoke VNet -->
  <g filter="url(#shadow)">
    <rect x="20" y="100" width="140" height="44" rx="8" fill="#fff" stroke="#5c5c5c" stroke-width="1.2"/>
    <text x="90" y="120" text-anchor="middle" fill="#333" font-size="11" font-weight="600">Spoke VNet</text>
    <text x="90" y="136" text-anchor="middle" fill="#888" font-size="9">App / Container</text>
  </g>
  <line x1="164" y1="122" x2="220" y2="122" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- VPN Client -->
  <g filter="url(#shadow)">
    <rect x="20" y="164" width="140" height="44" rx="8" fill="#fff" stroke="#7b1fa2" stroke-width="1.2"/>
    <text x="90" y="184" text-anchor="middle" fill="#7b1fa2" font-size="11" font-weight="600">VPN Client</text>
    <text x="90" y="200" text-anchor="middle" fill="#888" font-size="9">DNS set to inbound IP</text>
  </g>
  <line x1="164" y1="186" x2="206" y2="140" stroke="#0078d4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Right: External -->
  <g filter="url(#shadow)">
    <rect x="685" y="190" width="140" height="44" rx="8" fill="#f5f5f5" stroke="#999" stroke-width="1.2"/>
    <text x="755" y="210" text-anchor="middle" fill="#333" font-size="11" font-weight="600">Public DNS</text>
    <text x="755" y="226" text-anchor="middle" fill="#888" font-size="9">External overrides</text>
  </g>
  <line x1="629" y1="230" x2="680" y2="220" stroke="#999" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGr)"/>

  <!-- VPN Gateway (in hub) -->
  <g filter="url(#shadow)">
    <rect x="225" y="296" width="400" height="48" rx="8" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
    <text x="425" y="316" text-anchor="middle" fill="#7b1fa2" font-size="11" font-weight="600">VPN Gateway</text>
    <text x="425" y="334" text-anchor="middle" fill="#888" font-size="9">S2S + P2S connectivity. DNS server config points to inbound endpoint IP.</text>
  </g>

  <!-- Legend -->
  <rect x="20" y="370" width="820" height="36" rx="6" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="36" y="380" width="12" height="12" rx="3" fill="#0078d4"/>
  <text x="56" y="390" fill="#555" font-size="9">Inbound (receives queries)</text>
  <rect x="210" y="380" width="12" height="12" rx="3" fill="#e65100"/>
  <text x="230" y="390" fill="#555" font-size="9">Outbound (forwards queries)</text>
  <rect x="400" y="380" width="12" height="12" rx="3" fill="#2e7d32"/>
  <text x="420" y="390" fill="#555" font-size="9">Private DNS Zones</text>
  <rect x="560" y="380" width="12" height="12" rx="3" fill="#7b1fa2"/>
  <text x="580" y="390" fill="#555" font-size="9">VPN (same resolution path as spokes)</text>
</svg>
