<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowGr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c5c5c"/>
    </marker>
  </defs>

  <rect width="860" height="360" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">OIDC Authentication: GitHub Actions &#8594; Azure</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">No secrets stored. No rotation needed. Token lives for one job.</text>

  <!-- Step 1: GitHub Actions -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="160" height="80" rx="10" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <rect x="30" y="70" width="160" height="30" rx="10" fill="#333"/>
    <rect x="30" y="86" width="160" height="14" fill="#333"/>
    <text x="110" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">GitHub Actions</text>
  </g>
  <text x="110" y="118" text-anchor="middle" fill="#333" font-size="10">Workflow runs</text>
  <text x="110" y="134" text-anchor="middle" fill="#888" font-size="9">permissions: id-token: write</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="110" x2="245" y2="110" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="100" text-anchor="middle" fill="#0078d4" font-size="8" font-weight="600">1. request token</text>

  <!-- Step 2: GitHub OIDC Provider -->
  <g filter="url(#shadow)">
    <rect x="250" y="70" width="170" height="80" rx="10" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="250" y="70" width="170" height="30" rx="10" fill="#e65100"/>
    <rect x="250" y="86" width="170" height="14" fill="#e65100"/>
    <text x="335" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">GitHub OIDC Provider</text>
  </g>
  <text x="335" y="118" text-anchor="middle" fill="#333" font-size="10">Issues JWT token</text>
  <text x="335" y="134" text-anchor="middle" fill="#888" font-size="9">sub: repo:org/repo:env:prod</text>

  <!-- Arrow 2 -->
  <line x1="425" y1="110" x2="485" y2="110" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="455" y="100" text-anchor="middle" fill="#0078d4" font-size="8" font-weight="600">2. JWT token</text>

  <!-- Step 3: Azure AD -->
  <g filter="url(#shadow)">
    <rect x="490" y="70" width="170" height="80" rx="10" fill="#fff" stroke="#0078d4" stroke-width="1.5"/>
    <rect x="490" y="70" width="170" height="30" rx="10" fill="#0078d4"/>
    <rect x="490" y="86" width="170" height="14" fill="#0078d4"/>
    <text x="575" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Azure AD / Entra ID</text>
  </g>
  <text x="575" y="118" text-anchor="middle" fill="#333" font-size="10">Validates subject claim</text>
  <text x="575" y="134" text-anchor="middle" fill="#888" font-size="9">Matches federated credential</text>

  <!-- Arrow 3 -->
  <line x1="665" y1="110" x2="715" y2="110" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="690" y="100" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="600">3. access token</text>

  <!-- Step 4: Azure Resources -->
  <g filter="url(#shadow)">
    <rect x="720" y="70" width="120" height="80" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="720" y="70" width="120" height="30" rx="10" fill="#2e7d32"/>
    <rect x="720" y="86" width="120" height="14" fill="#2e7d32"/>
    <text x="780" y="90" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Azure</text>
  </g>
  <text x="780" y="118" text-anchor="middle" fill="#333" font-size="10">Deploy resources</text>
  <text x="780" y="134" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="600">Authenticated!</text>

  <!-- Bottom: Before vs After -->
  <rect x="30" y="180" width="385" height="160" rx="10" fill="#fef0f0" stroke="#c62828" stroke-width="1"/>
  <text x="222" y="204" text-anchor="middle" fill="#c62828" font-size="13" font-weight="700">Before: Client Secrets</text>
  <text x="60" y="228" fill="#333" font-size="10">&#8226; Secret stored in GitHub repo settings</text>
  <text x="60" y="248" fill="#333" font-size="10">&#8226; Expires after 1-2 years, breaks pipelines</text>
  <text x="60" y="268" fill="#333" font-size="10">&#8226; Anyone with repo access can read it</text>
  <text x="60" y="288" fill="#333" font-size="10">&#8226; Rotation requires manual coordination</text>
  <text x="60" y="310" fill="#c62828" font-size="10" font-weight="600">&#8226; Leaked secret = full Azure access until revoked</text>
  <text x="60" y="330" fill="#888" font-size="9" font-style="italic">Long-lived credential sitting in a JSON field. What could go wrong?</text>

  <rect x="445" y="180" width="385" height="160" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1"/>
  <text x="637" y="204" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="700">After: OIDC Federation</text>
  <text x="475" y="228" fill="#333" font-size="10">&#8226; No secret to store or rotate</text>
  <text x="475" y="248" fill="#333" font-size="10">&#8226; Token issued per job, expires in minutes</text>
  <text x="475" y="268" fill="#333" font-size="10">&#8226; Scoped to specific repo + environment</text>
  <text x="475" y="288" fill="#333" font-size="10">&#8226; Azure validates claims at auth time</text>
  <text x="475" y="310" fill="#2e7d32" font-size="10" font-weight="600">&#8226; Nothing to leak. Token is ephemeral.</text>
  <text x="475" y="330" fill="#888" font-size="9" font-style="italic">The best secret is the one that doesn't exist.</text>
</svg>
