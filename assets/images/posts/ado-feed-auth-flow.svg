<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
  </defs>

  <rect width="860" height="320" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">GitHub Actions &#8594; Azure AD &#8594; DevOps Artifacts Feed</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">OIDC login, then exchange for a DevOps-scoped token. No PATs needed.</text>

  <!-- Step 1: GitHub Actions OIDC -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="160" height="76" rx="10" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <rect x="30" y="70" width="160" height="28" rx="10" fill="#333"/>
    <rect x="30" y="86" width="160" height="12" fill="#333"/>
    <text x="110" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">GitHub Actions</text>
  </g>
  <text x="110" y="114" text-anchor="middle" fill="#333" font-size="10">azure/login@v2</text>
  <text x="110" y="130" text-anchor="middle" fill="#888" font-size="9">OIDC federation</text>

  <!-- Arrow 1 -->
  <line x1="195" y1="108" x2="245" y2="108" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="220" y="100" text-anchor="middle" fill="#0078d4" font-size="8" font-weight="600">1. OIDC login</text>

  <!-- Step 2: Azure AD -->
  <g filter="url(#shadow)">
    <rect x="250" y="70" width="160" height="76" rx="10" fill="#fff" stroke="#0078d4" stroke-width="1.5"/>
    <rect x="250" y="70" width="160" height="28" rx="10" fill="#0078d4"/>
    <rect x="250" y="86" width="160" height="12" fill="#0078d4"/>
    <text x="330" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Azure AD</text>
  </g>
  <text x="330" y="114" text-anchor="middle" fill="#333" font-size="10">Authenticated</text>
  <text x="330" y="130" text-anchor="middle" fill="#888" font-size="9">Service principal</text>

  <!-- Arrow 2 -->
  <line x1="415" y1="108" x2="465" y2="108" stroke="#e65100" stroke-width="2" marker-end="url(#arrowO)"/>
  <text x="440" y="98" text-anchor="middle" fill="#e65100" font-size="7" font-weight="600">2. get-access-token</text>

  <!-- Step 3: Token Exchange -->
  <g filter="url(#shadow)">
    <rect x="470" y="70" width="180" height="76" rx="10" fill="#fff" stroke="#e65100" stroke-width="1.5"/>
    <rect x="470" y="70" width="180" height="28" rx="10" fill="#e65100"/>
    <rect x="470" y="86" width="180" height="12" fill="#e65100"/>
    <text x="560" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Token Exchange</text>
  </g>
  <text x="560" y="112" text-anchor="middle" fill="#e65100" font-size="8" font-family="monospace">499b84ac-.../.default</text>
  <text x="560" y="130" text-anchor="middle" fill="#888" font-size="9">DevOps-scoped token</text>

  <!-- Arrow 3 -->
  <line x1="655" y1="108" x2="695" y2="108" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="675" y="100" text-anchor="middle" fill="#2e7d32" font-size="8" font-weight="600">3. feed token</text>

  <!-- Step 4: Artifacts Feed -->
  <g filter="url(#shadow)">
    <rect x="700" y="70" width="130" height="76" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="700" y="70" width="130" height="28" rx="10" fill="#2e7d32"/>
    <rect x="700" y="86" width="130" height="12" fill="#2e7d32"/>
    <text x="765" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Artifacts Feed</text>
  </g>
  <text x="765" y="114" text-anchor="middle" fill="#333" font-size="10">pip / npm / nuget</text>
  <text x="765" y="130" text-anchor="middle" fill="#2e7d32" font-size="9" font-weight="600">Packages!</text>

  <!-- Bottom: The magic scope explained -->
  <rect x="30" y="170" width="800" height="130" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="194" text-anchor="middle" fill="#333" font-size="13" font-weight="700">The Magic Scope</text>

  <rect x="50" y="206" width="760" height="34" rx="6" fill="#fff8e8" stroke="#e65100" stroke-width="1"/>
  <text x="430" y="228" text-anchor="middle" fill="#e65100" font-size="12" font-family="monospace">499b84ac-1321-427f-aa17-267ca6975798/.default</text>

  <text x="430" y="260" text-anchor="middle" fill="#555" font-size="11">This is the Azure DevOps Services resource ID. It grants access to the DevOps REST API</text>
  <text x="430" y="276" text-anchor="middle" fill="#555" font-size="11">(including Artifacts feeds) using your service principal's assigned permissions.</text>
  <text x="430" y="296" text-anchor="middle" fill="#888" font-size="10" font-style="italic">You'll never guess this UUID. Bookmark it. Tattoo it. Whatever works.</text>
</svg>
