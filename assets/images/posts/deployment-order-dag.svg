<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
  </defs>

  <rect width="700" height="320" rx="12" fill="#f9fafb"/>
  <text x="350" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Deployment Order</text>
  <text x="350" y="46" text-anchor="middle" fill="#888" font-size="11">Get it wrong and Terraform can't find what it depends on</text>

  <!-- AVNM node -->
  <g filter="url(#shadow)">
    <rect x="260" y="60" width="180" height="44" rx="10" fill="#c62828"/>
    <text x="350" y="78" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">1. AVNM</text>
    <text x="350" y="96" text-anchor="middle" fill="#ffcdd2" font-size="10">IPAM pools, security rules</text>
  </g>

  <!-- Hub node -->
  <g filter="url(#shadow)">
    <rect x="260" y="130" width="180" height="44" rx="10" fill="#0078d4"/>
    <text x="350" y="148" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">2. Hub</text>
    <text x="350" y="166" text-anchor="middle" fill="#c8e1f5" font-size="10">VNets, VPN, DNS resolvers</text>
  </g>

  <!-- AVNM -> Hub -->
  <line x1="350" y1="104" x2="350" y2="126" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DNS node -->
  <g filter="url(#shadow)">
    <rect x="100" y="205" width="180" height="44" rx="10" fill="#2e7d32"/>
    <text x="190" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3a. DNS</text>
    <text x="190" y="241" text-anchor="middle" fill="#c8e6c9" font-size="10">Zones + VNet links</text>
  </g>

  <!-- Firewall node -->
  <g filter="url(#shadow)">
    <rect x="420" y="205" width="180" height="44" rx="10" fill="#e65100"/>
    <text x="510" y="223" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">3b. Firewall</text>
    <text x="510" y="241" text-anchor="middle" fill="#ffe0b2" font-size="10">Rules + collections</text>
  </g>

  <!-- Hub -> DNS -->
  <line x1="300" y1="174" x2="230" y2="201" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Hub -> Firewall -->
  <line x1="400" y1="174" x2="470" y2="201" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Parallel indicator -->
  <line x1="284" y1="227" x2="416" y2="227" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="350" y="224" text-anchor="middle" fill="#999" font-size="9" font-weight="600">parallel</text>

  <!-- Spokes node -->
  <g filter="url(#shadow)">
    <rect x="260" y="275" width="180" height="44" rx="10" fill="#7b1fa2"/>
    <text x="350" y="293" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">4. Spokes</text>
    <text x="350" y="311" text-anchor="middle" fill="#e1bee7" font-size="10">Needs everything above</text>
  </g>

  <!-- DNS -> Spokes -->
  <line x1="230" y1="249" x2="310" y2="271" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Firewall -> Spokes -->
  <line x1="470" y1="249" x2="390" y2="271" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Side annotations -->
  <text x="30" y="82" fill="#c62828" font-size="10" font-weight="600">Deploy first</text>
  <text x="30" y="96" fill="#888" font-size="9">Global control plane</text>

  <text x="30" y="152" fill="#0078d4" font-size="10" font-weight="600">Deploy second</text>
  <text x="30" y="166" fill="#888" font-size="9">Network core</text>

  <text x="30" y="227" fill="#2e7d32" font-size="10" font-weight="600">Deploy third</text>
  <text x="30" y="241" fill="#888" font-size="9">Can be parallel</text>

  <text x="30" y="297" fill="#7b1fa2" font-size="10" font-weight="600">Deploy last</text>
  <text x="30" y="311" fill="#888" font-size="9">Depends on all</text>
</svg>
