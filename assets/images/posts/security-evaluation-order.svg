<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5c5c5c"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="800" height="360" rx="12" fill="#f9fafb"/>
  <text x="400" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Security Rule Evaluation Order</text>
  <text x="400" y="46" text-anchor="middle" fill="#888" font-size="11">AVNM Security Admin wins. Always.</text>

  <!-- Incoming traffic -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="140" height="50" rx="8" fill="#fff" stroke="#5c5c5c" stroke-width="1.5"/>
    <text x="100" y="102" text-anchor="middle" fill="#333" font-size="12" font-weight="600">Incoming Traffic</text>
    <text x="100" y="118" text-anchor="middle" fill="#888" font-size="10">SSH from Internet</text>
  </g>

  <!-- Arrow to Layer 1 -->
  <line x1="175" y1="105" x2="225" y2="105" stroke="#5c5c5c" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Layer 1: AVNM Security Admin -->
  <g filter="url(#shadow)">
    <rect x="230" y="68" width="200" height="74" rx="10" fill="#fef0f0" stroke="#c62828" stroke-width="2"/>
    <rect x="230" y="68" width="200" height="30" rx="10" fill="#c62828"/>
    <rect x="230" y="84" width="200" height="14" fill="#c62828"/>
    <text x="330" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">AVNM Security Admin</text>
  </g>
  <text x="330" y="115" text-anchor="middle" fill="#c62828" font-size="11" font-weight="600">DENY SSH from Internet</text>
  <text x="330" y="131" text-anchor="middle" fill="#888" font-size="10">Can't be overridden</text>

  <!-- BLOCKED arrow -->
  <line x1="330" y1="148" x2="330" y2="186" stroke="#c62828" stroke-width="2" marker-end="url(#arrowR)"/>
  <rect x="290" y="190" width="80" height="28" rx="6" fill="#c62828"/>
  <text x="330" y="208" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">BLOCKED</text>

  <!-- Layer 2: NSG (shown as bypassed) -->
  <g filter="url(#shadow)" opacity="0.4">
    <rect x="500" y="68" width="200" height="74" rx="10" fill="#f5f5f5" stroke="#999" stroke-width="1.5"/>
    <rect x="500" y="68" width="200" height="30" rx="10" fill="#999"/>
    <rect x="500" y="84" width="200" height="14" fill="#999"/>
    <text x="600" y="88" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">NSG Rules</text>
  </g>
  <text x="600" y="115" text-anchor="middle" fill="#999" font-size="11">Allow SSH from * to *</text>
  <text x="600" y="131" text-anchor="middle" fill="#aaa" font-size="10">Developer added this</text>
  <text x="600" y="155" text-anchor="middle" fill="#c62828" font-size="11" font-weight="600" font-style="italic">Never reached</text>

  <!-- Dashed line showing it's bypassed -->
  <line x1="435" y1="105" x2="495" y2="105" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Bottom: Two-layer summary -->
  <rect x="30" y="240" width="740" height="100" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Layer 1 box -->
  <rect x="50" y="258" width="340" height="68" rx="8" fill="#fef0f0" stroke="#c62828" stroke-width="1"/>
  <text x="220" y="278" text-anchor="middle" fill="#c62828" font-size="12" font-weight="700">Layer 1: AVNM Security Admin</text>
  <text x="220" y="295" text-anchor="middle" fill="#555" font-size="10">The floor. Non-negotiable. Lives in connectivity sub.</text>
  <text x="220" y="310" text-anchor="middle" fill="#888" font-size="10">Block internet SSH/RDP + Allow VPN + Allow Azure outbound</text>

  <!-- Layer 2 box -->
  <rect x="410" y="258" width="340" height="68" rx="8" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1"/>
  <text x="580" y="278" text-anchor="middle" fill="#2e7d32" font-size="12" font-weight="700">Layer 2: Spoke Shared NSG</text>
  <text x="580" y="295" text-anchor="middle" fill="#555" font-size="10">Starting point. Teams can extend, not weaken.</text>
  <text x="580" y="310" text-anchor="middle" fill="#888" font-size="10">Hub-spoke traffic + VPN access + DNS resolution</text>

  <text x="400" y="354" text-anchor="middle" fill="#999" font-size="10" font-style="italic">Layer 1 always wins. Layer 2 is the starting point. Both work together.</text>
</svg>
