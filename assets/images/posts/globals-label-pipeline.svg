<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0078d4"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect width="860" height="340" rx="12" fill="#f9fafb"/>
  <text x="430" y="28" text-anchor="middle" fill="#333" font-size="16" font-weight="700">Globals + Labels: How Auto-Naming Works</text>
  <text x="430" y="46" text-anchor="middle" fill="#888" font-size="11">You provide 4 inputs. Globals validates. Labels assemble. Resources get named.</text>

  <!-- Step 1: Inputs -->
  <g filter="url(#shadow)">
    <rect x="30" y="70" width="160" height="120" rx="10" fill="#fff" stroke="#5c5c5c" stroke-width="1.5"/>
    <rect x="30" y="70" width="160" height="28" rx="10" fill="#5c5c5c"/>
    <rect x="30" y="86" width="160" height="12" fill="#5c5c5c"/>
    <text x="110" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Your Inputs</text>
  </g>
  <text x="50" y="114" fill="#333" font-size="10" font-family="monospace">location = "westeurope"</text>
  <text x="50" y="130" fill="#333" font-size="10" font-family="monospace">environment = "stg"</text>
  <text x="50" y="146" fill="#333" font-size="10" font-family="monospace">team_acronym = "pay"</text>
  <text x="50" y="162" fill="#333" font-size="10" font-family="monospace">app_name = "api"</text>
  <text x="110" y="184" text-anchor="middle" fill="#888" font-size="9" font-style="italic">4 values. That's all you provide.</text>

  <!-- Arrow -->
  <line x1="195" y1="130" x2="235" y2="130" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Globals Module -->
  <g filter="url(#shadow)">
    <rect x="240" y="70" width="185" height="120" rx="10" fill="#fff" stroke="#0078d4" stroke-width="2"/>
    <rect x="240" y="70" width="185" height="28" rx="10" fill="#0078d4"/>
    <rect x="240" y="86" width="185" height="12" fill="#0078d4"/>
    <text x="333" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Globals Module</text>
  </g>
  <text x="260" y="114" fill="#333" font-size="9">Validates inputs at plan time</text>
  <text x="260" y="132" fill="#0078d4" font-size="9" font-family="monospace">westeurope &#8594; weu</text>
  <text x="260" y="148" fill="#0078d4" font-size="9" font-family="monospace">stg &#8594; Staging</text>
  <text x="260" y="164" fill="#333" font-size="9">Adds predefined tags</text>
  <text x="260" y="180" fill="#888" font-size="9">Outputs: global_config</text>

  <!-- Arrow -->
  <line x1="430" y1="130" x2="470" y2="130" stroke="#0078d4" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Label Module -->
  <g filter="url(#shadow)">
    <rect x="475" y="70" width="185" height="120" rx="10" fill="#fff" stroke="#e65100" stroke-width="2"/>
    <rect x="475" y="70" width="185" height="28" rx="10" fill="#e65100"/>
    <rect x="475" y="86" width="185" height="12" fill="#e65100"/>
    <text x="568" y="88" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Label Module</text>
  </g>
  <text x="495" y="114" fill="#333" font-size="9">Assembles the name:</text>
  <text x="495" y="132" fill="#e65100" font-size="9" font-family="monospace">{ns}-{name}-{stage}-{attr}</text>
  <text x="495" y="150" fill="#e65100" font-size="9" font-family="monospace">rg-pay-api-stg-weu</text>
  <text x="495" y="168" fill="#333" font-size="9">Handles delimiter rules</text>
  <text x="495" y="184" fill="#888" font-size="9">Output: label.id</text>

  <!-- Arrow -->
  <line x1="665" y1="130" x2="700" y2="130" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 4: Resource -->
  <g filter="url(#shadow)">
    <rect x="705" y="80" width="130" height="100" rx="10" fill="#f0f7f0" stroke="#2e7d32" stroke-width="2"/>
    <rect x="705" y="80" width="130" height="28" rx="10" fill="#2e7d32"/>
    <rect x="705" y="96" width="130" height="12" fill="#2e7d32"/>
    <text x="770" y="98" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Resource</text>
  </g>
  <text x="770" y="124" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">name =</text>
  <text x="770" y="140" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">label.id</text>
  <text x="770" y="160" text-anchor="middle" fill="#888" font-size="9">tags =</text>
  <text x="770" y="174" text-anchor="middle" fill="#888" font-size="9">global_config.all_tags</text>

  <!-- Bottom: Per-resource-type labels -->
  <rect x="30" y="215" width="800" height="108" rx="10" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="430" y="236" text-anchor="middle" fill="#333" font-size="12" font-weight="700">One label per resource type. Same globals. Different namespace + delimiter.</text>

  <rect x="50" y="248" width="170" height="60" rx="6" fill="#e8f4fd" stroke="#0078d4" stroke-width="1"/>
  <text x="135" y="266" text-anchor="middle" fill="#0078d4" font-size="10" font-weight="600">Resource Group</text>
  <text x="135" y="280" text-anchor="middle" fill="#333" font-size="9" font-family="monospace">ns="rg" delim="-"</text>
  <text x="135" y="296" text-anchor="middle" fill="#888" font-size="9">rg-pay-api-stg-weu</text>

  <rect x="240" y="248" width="170" height="60" rx="6" fill="#fff8e8" stroke="#e65100" stroke-width="1"/>
  <text x="325" y="266" text-anchor="middle" fill="#e65100" font-size="10" font-weight="600">Key Vault</text>
  <text x="325" y="280" text-anchor="middle" fill="#333" font-size="9" font-family="monospace">ns="kv" delim="-"</text>
  <text x="325" y="296" text-anchor="middle" fill="#888" font-size="9">kv-pay-api-stg-weu</text>

  <rect x="430" y="248" width="170" height="60" rx="6" fill="#f0f7f0" stroke="#2e7d32" stroke-width="1"/>
  <text x="515" y="266" text-anchor="middle" fill="#2e7d32" font-size="10" font-weight="600">Storage Account</text>
  <text x="515" y="280" text-anchor="middle" fill="#333" font-size="9" font-family="monospace">ns="st" delim=""</text>
  <text x="515" y="296" text-anchor="middle" fill="#888" font-size="9">stpayapistgweu</text>

  <rect x="620" y="248" width="190" height="60" rx="6" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1"/>
  <text x="715" y="266" text-anchor="middle" fill="#7b1fa2" font-size="10" font-weight="600">Container</text>
  <text x="715" y="280" text-anchor="middle" fill="#333" font-size="9" font-family="monospace">no ns, delim="-"</text>
  <text x="715" y="296" text-anchor="middle" fill="#888" font-size="9">pay-api-weu</text>
</svg>
